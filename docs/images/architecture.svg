<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <rect width="900" height="460" fill="#0d1117"/>
  <text x="450" y="38" fill="#e6edf3" font-size="22" font-weight="700" text-anchor="middle">Blue Team Home Lab — Arquitetura</text>
  <text x="450" y="60" fill="#8b949e" font-size="13" text-anchor="middle">Ambiente isolado · gerar ataque → coletar → detectar → investigar → documentar</text>

  <!-- Attacker -->
  <rect x="40" y="120" width="150" height="90" rx="10" fill="#161b22" stroke="#f85149" stroke-width="2"/>
  <text x="115" y="150" fill="#f85149" font-size="15" font-weight="700" text-anchor="middle">Atacante</text>
  <text x="115" y="172" fill="#c9d1d9" font-size="12" text-anchor="middle">Kali Linux</text>
  <text x="115" y="190" fill="#8b949e" font-size="11" text-anchor="middle">nmap · hydra · sqlmap</text>

  <!-- Targets -->
  <rect x="260" y="95" width="170" height="70" rx="10" fill="#161b22" stroke="#d29922" stroke-width="2"/>
  <text x="345" y="122" fill="#d29922" font-size="14" font-weight="700" text-anchor="middle">Alvo SSH</text>
  <text x="345" y="142" fill="#8b949e" font-size="11" text-anchor="middle">openssh-server</text>
  <text x="345" y="157" fill="#8b949e" font-size="11" text-anchor="middle">→ auth.log</text>

  <rect x="260" y="180" width="170" height="70" rx="10" fill="#161b22" stroke="#d29922" stroke-width="2"/>
  <text x="345" y="207" fill="#d29922" font-size="14" font-weight="700" text-anchor="middle">Alvo Web</text>
  <text x="345" y="227" fill="#8b949e" font-size="11" text-anchor="middle">DVWA</text>
  <text x="345" y="242" fill="#8b949e" font-size="11" text-anchor="middle">→ access.log</text>

  <!-- Filebeat -->
  <rect x="500" y="135" width="130" height="80" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="565" y="165" fill="#58a6ff" font-size="14" font-weight="700" text-anchor="middle">Filebeat</text>
  <text x="565" y="186" fill="#8b949e" font-size="11" text-anchor="middle">coleta + envio</text>
  <text x="565" y="201" fill="#8b949e" font-size="11" text-anchor="middle">(+ parser Python)</text>

  <!-- Elasticsearch -->
  <rect x="700" y="95" width="160" height="70" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="780" y="122" fill="#3fb950" font-size="14" font-weight="700" text-anchor="middle">Elasticsearch</text>
  <text x="780" y="142" fill="#8b949e" font-size="11" text-anchor="middle">índice lab-logs-*</text>
  <text x="780" y="157" fill="#8b949e" font-size="11" text-anchor="middle">busca + agregação</text>

  <!-- Kibana -->
  <rect x="700" y="185" width="160" height="70" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="780" y="212" fill="#3fb950" font-size="14" font-weight="700" text-anchor="middle">Kibana</text>
  <text x="780" y="232" fill="#8b949e" font-size="11" text-anchor="middle">dashboards</text>
  <text x="780" y="247" fill="#8b949e" font-size="11" text-anchor="middle">KQL · alertas</text>

  <!-- Analyst -->
  <rect x="355" y="330" width="190" height="80" rx="10" fill="#161b22" stroke="#a371f7" stroke-width="2"/>
  <text x="450" y="360" fill="#a371f7" font-size="15" font-weight="700" text-anchor="middle">Analista (Blue Team)</text>
  <text x="450" y="382" fill="#8b949e" font-size="11" text-anchor="middle">investiga · detecta · documenta</text>
  <text x="450" y="398" fill="#8b949e" font-size="11" text-anchor="middle">Sigma · MITRE ATT&amp;CK · write-ups</text>

  <!-- Arrows -->
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8b949e"/>
    </marker>
  </defs>
  <line x1="190" y1="150" x2="256" y2="130" stroke="#f85149" stroke-width="2" marker-end="url(#a)" stroke-dasharray="5,4"/>
  <line x1="190" y1="180" x2="256" y2="210" stroke="#f85149" stroke-width="2" marker-end="url(#a)" stroke-dasharray="5,4"/>
  <line x1="430" y1="130" x2="497" y2="160" stroke="#8b949e" stroke-width="2" marker-end="url(#a)"/>
  <line x1="430" y1="215" x2="497" y2="190" stroke="#8b949e" stroke-width="2" marker-end="url(#a)"/>
  <line x1="630" y1="150" x2="697" y2="140" stroke="#8b949e" stroke-width="2" marker-end="url(#a)"/>
  <line x1="630" y1="180" x2="697" y2="210" stroke="#8b949e" stroke-width="2" marker-end="url(#a)"/>
  <line x1="780" y1="255" x2="540" y2="345" stroke="#a371f7" stroke-width="2" marker-end="url(#a)"/>

  <text x="223" y="120" fill="#f85149" font-size="10" text-anchor="middle">ataque</text>
  <text x="463" y="120" fill="#8b949e" font-size="10" text-anchor="middle">logs</text>
  <text x="663" y="128" fill="#8b949e" font-size="10" text-anchor="middle">ingest</text>
</svg>
